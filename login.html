<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Masuk Dasbor — Aether Studio</title>
    
    <!-- Real Google Fonts: Space Grotesk & Plus Jakarta Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK Compat (Legacy / Vanilla HTML friendly) -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="light-glass-theme login-page-body">
    
    <!-- Ambient Light/Background Orbs -->
    <div class="ambient-glow orb-indigo"></div>
    <div class="ambient-glow orb-pink"></div>

    <div class="login-container">
        <div class="login-card glass-card premium-glass hover-tilt">
            <div class="login-header">
                <a href="index.html" class="nav-logo">
                    <span class="logo-accent">✦</span> Aether<span class="weight-light">Studio</span>
                </a>
                <h2>Area Masuk Klien</h2>
                <p>Silakan masuk untuk mengelola file projek Anda</p>
            </div>

            <!-- Feedback Message Container -->
            <div id="authFeedback" class="auth-feedback"></div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="loginEmail">Alamat Email</label>
                    <input type="email" id="loginEmail" class="glass-input" placeholder="nama@email.com" required autocomplete="email">
                </div>
                <div class="form-group">
                    <div class="label-wrapper">
                        <label for="loginPassword">Kata Sandi</label>
                        <a href="forgot-password.html" class="forgot-password-link">Lupa Kata Sandi?</a>
                    </div>
                    <div class="input-password-wrapper">
                        <input type="password" id="loginPassword" class="glass-input" placeholder="••••••••" required autocomplete="current-password">
                        <button type="button" class="toggle-password-btn">Lihat</button>
                    </div>
                </div>
                
                <button type="submit" id="loginSubmitBtn" class="btn-primary-glow btn-block">Masuk ke Sistem</button>
            </form>

            <div class="login-divider">
                <span>atau hubungkan lewat</span>
            </div>

            <div class="social-login-grid">
                <button type="button" id="googleLoginBtn" class="btn-social-glass">
                    <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12.24 10.285V14.4h6.887c-.648 2.41-2.519 4.114-5.18 4.114-3.5 0-6.326-2.825-6.326-6.326 0-3.5 2.825-6.326 6.326-6.326 1.472 0 2.825.518 3.916 1.417l3.111-3.11C18.827 2.206 15.71 1 12.24 1c-6.075 0-11 4.925-11 11s4.925 11 11 11c6.338 0 10.518-4.45 10.518-10.715 0-.727-.064-1.272-.191-1.7H12.24z"/></svg>
                    Google
                </button>
                <button type="button" id="githubLoginBtn" class="btn-social-glass">
                    <svg class="social-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/></svg>
                    GitHub
                </button>
            </div>

            <div class="login-footer">
                <span>Belum punya akun? <a href="signup.html" class="signup-link">Daftar</a></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
