<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setel Ulang Sandi — Aether Studio</title>
    
    <!-- Real Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="style.css">

    <!-- Firebase SDK Compat -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
</head>
<body class="light-glass-theme login-page-body">
    
    <!-- Ambient Light/Background Orbs -->
    <div class="ambient-glow orb-pink"></div>

    <div class="login-container">
        <div class="login-card glass-card premium-glass hover-tilt">
            <div class="login-header">
                <a href="index.html" class="nav-logo">
                    <span class="logo-accent">✦</span> Aether<span class="weight-light">Studio</span>
                </a>
                <h2>Lupa Kata Sandi?</h2>
                <p>Masukkan email terdaftar untuk menerima tautan setel ulang</p>
            </div>

            <!-- Feedback Message Container -->
            <div id="authFeedback" class="auth-feedback"></div>

            <form id="forgotPasswordForm" class="login-form">
                <div class="form-group">
                    <label for="resetEmail">Alamat Email</label>
                    <input type="email" id="resetEmail" class="glass-input" placeholder="nama@email.com" required autocomplete="email">
                </div>
                
                <button type="submit" id="resetSubmitBtn" class="btn-primary-glow btn-block">Kirim Tautan Setel Ulang</button>
            </form>

            <div class="login-footer" style="margin-top: 24px;">
                <span>Ingat kata sandi? <a href="login.html" class="signup-link">Kembali Masuk</a></span>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
